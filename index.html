<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ńįnanc v…ô Elm: ńįntellektual M√ľsabiq…ô</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f8;
            --text-color: #2b2d42;
            --primary-color: #1a535c;
            --accent-color: #ff6b6b;
            --success-color: #4ecdc4;
            --card-bg: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        .container { 
            width: 100%; 
            max-width: 900px; 
            padding: 40px; 
            position: relative; 
        }
        
        .screen { 
            display: none; 
            opacity: 0; 
            transition: var(--transition); 
            text-align: center; 
            background: var(--card-bg);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .screen.active { 
            display: block; 
            opacity: 1; 
            animation: fadeIn 0.6s ease forwards; 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* Typography */
        h1 { font-weight: 300; font-size: 2.8rem; margin-bottom: 15px; color: var(--primary-color); }
        p { font-weight: 300; font-size: 1.1rem; margin-bottom: 40px; color: #666; line-height: 1.6; }
        
        /* Inputs & Buttons */
        input { 
            width: 100%; 
            max-width: 350px; 
            padding: 16px 24px; 
            border: 2px solid #e1e5eb; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            margin-bottom: 30px; 
            outline: none; 
            transition: var(--transition); 
            text-align: center;
        }
        input:focus { border-color: var(--primary-color); }
        
        button.primary-btn { 
            background-color: var(--primary-color); 
            color: #fff; 
            border: none; 
            padding: 16px 45px; 
            font-size: 1.1rem; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: var(--transition); 
            font-weight: 600; 
            letter-spacing: 0.5px;
        }
        button.primary-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(26, 83, 92, 0.2); 
        }

        /* Game Elements */
        .header-stats { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 40px; 
            font-size: 1rem; 
            font-weight: 600; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        
        .question-text { 
            font-size: 1.6rem; 
            font-weight: 400; 
            margin-bottom: 40px; 
            line-height: 1.5; 
            color: var(--text-color);
        }
        
        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        
        .option-btn { 
            background-color: #f8f9fa; 
            color: var(--text-color); 
            border: 2px solid transparent; 
            padding: 25px; 
            border-radius: 16px; 
            font-size: 1.1rem; 
            text-align: left; 
            cursor: pointer; 
            transition: var(--transition); 
            line-height: 1.4;
        }
        
        .option-btn:hover { 
            background-color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); 
        }
        
        .option-btn.correct { background-color: var(--success-color); color: white; border-color: var(--success-color); }
        .option-btn.wrong { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }

        /* Timer */
        .timer-wrapper { 
            position: relative; 
            width: 70px; 
            height: 70px; 
            margin: 0 auto 30px; 
        }
        .timer-text { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            font-weight: 600; 
            font-size: 1.3rem; 
            color: var(--primary-color);
        }
        svg circle { transition: stroke-dashoffset 1s linear; }

        /* Leaderboard */
        .leaderboard-list { list-style: none; margin-top: 40px; text-align: left; }
        .leaderboard-list li { 
            background: #f8f9fa; 
            padding: 25px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.2rem;
            font-weight: 600; 
            transition: var(--transition);
        }
        .leaderboard-list li:hover { transform: scale(1.02); }
        .podium-1 { border-left: 6px solid #FFD700; background: linear-gradient(90deg, rgba(255,215,0,0.1) 0%, rgba(255,255,255,1) 100%) !important;}
        .podium-2 { border-left: 6px solid #C0C0C0; background: linear-gradient(90deg, rgba(192,192,192,0.1) 0%, rgba(255,255,255,1) 100%) !important;}
        .podium-3 { border-left: 6px solid #CD7F32; background: linear-gradient(90deg, rgba(205,127,50,0.1) 0%, rgba(255,255,255,1) 100%) !important;}
        .podium-other { border-left: 6px solid #e1e5eb; }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
            .screen { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="container">

        <input type="text" id="username" placeholder="Ad v…ô SoyadńĪnńĪzńĪ daxil edin" autocomplete="off">

<script>
    // Tam 20 suallńĪq baza (Kitab …ôsasńĪnda hazńĪrlanmńĪŇüdńĪr)
    const questions = [
        // Asan S…ôviyy…ô (10 xal)
        { q: "Ateizm s√∂z√ľn√ľn f…ôls…ôfi olaraq …ôsas m…ônasńĪ n…ôdir?", options: ["TanrńĪtanńĪmazlńĪq, AllahńĪ inkar etm…ôk", "B√ľt√ľn dinl…ôri q…ôbul etm…ôk", "T…ôbi…ôt…ô sitayiŇü", "YalnńĪz elm…ô inanmaq"], a: 0, points: 10 },
        { q: "T…ôkam√ľl n…ôz…ôriyy…ôsind…ôn g√∂t√ľr√ľl…ôr…ôk c…ômiyy…ôt…ô t…ôtbiq edil…ôn 'g√ľcl√ľn√ľn z…ôifi yox etm…ôsi' prinsipi nec…ô adlanńĪr?", options: ["Humanizm", "Sosial Darvinizm", "Naturalizm", "Deizm"], a: 1, points: 10 },
        { q: "KainatdakńĪ m√∂ht…ôŇü…ôm nizam v…ô intizam ńįslam inancńĪna g√∂r…ô n…ôyin …ôn …ôsas …ôqli d…ôlilidir?", options: ["T…ôsad√ľfl…ôrin", "AllahńĪn t…ôkliyinin (T√∂vhidin)", "T…ôbi…ôt qanunlarńĪnńĪn", "ńįnsan z…ôkasńĪnńĪn"], a: 1, points: 10 },
        { q: "ńįslama g√∂r…ô insanńĪn bu d√ľnyadakńĪ yaradńĪlńĪŇü qay…ôsi n…ôdir?", options: ["YalnńĪz ibad…ôt etm…ôk", "ńįmtahan olunmaq", "T…ôbi…ôti qorumaq", "S…ôrv…ôt toplamaq"], a: 1, points: 10 },
        { q: "F…ôls…ôf…ôd…ô z…ôlz…ôl…ô, sel f…ôlak…ôtl…ôri kimi insanńĪn irad…ôsi xaricind…ô baŇü ver…ôn hadis…ôl…ôr nec…ô adlandńĪrńĪlńĪr?", options: ["∆Źxlaqi Ňü…ôrl…ôr", "T…ôbii Ňü…ôrl…ôr", "ńįlahi c…ôza", "Sosioloji xaos"], a: 1, points: 10 },
        { q: "Avropa universitetl…ôrind…ô 600 il …ôsas kitab kimi oxudulan 'Kitab√ľŇü-Ňěifa' v…ô '∆Źl-Qanun fit-Tibb' …ôs…ôrl…ôrinin m√ľ…ôllifi kimdir?", options: ["ńįbni Sina", "∆Źl-Xar…ôzmi", "ńįbn R√ľŇüd", "∆Źl-Biruni"], a: 0, points: 10 },
        { q: "Sosiologiya elminin t…ôm…ôll…ôrini atan v…ô m…ôŇühur 'M√ľq…ôddim…ô' …ôs…ôrinin m√ľ…ôllifi kimdir?", options: ["ńįbn Xaldun", "∆Źl-C…ôz…ôri", "ńįbn C…ôssar", "∆Źl-B…ôlxi"], a: 0, points: 10 },

        // Orta S…ôviyy…ô (20 xal)
        { q: "Deizm f…ôls…ôfi inancńĪnńĪn t…ôm…ôl x√ľsusiyy…ôti n…ôdir?", options: ["YaradanńĪ v…ô dinl…ôri q…ôbul etm…ôk", "AllahńĪ q…ôbul edib, dinl…ôri v…ô m√ľdaxil…ôni inkar etm…ôk", "H…ôr Ňüeyi inkar etm…ôk", "√áoxallahlńĪlńĪńüńĪ m√ľdafi…ô etm…ôk"], a: 1, points: 20 },
        { q: "N…ôcmuddin √Ėm…ôr N…ôs…ôfiy…ô g√∂r…ô m…ôxluqatńĪn elm (bilgi) …ôld…ô etm…ô s…ôb…ôbl…ôri hansńĪlardńĪr?", options: ["YalnńĪz elm v…ô t…ôcr√ľb…ô", "ńįlham, hiss v…ô elm", "Sańülam hissl…ôr, dońüru x…ôb…ôr v…ô ańüńĪl", "YalnńĪz Quran v…ô S√ľnn…ô"], a: 2, points: 20 },
        { q: "Ateistl…ôrin 'BoŇüluqlarńĪn tanrńĪsńĪ' iddialarńĪnńĪn m…ônasńĪ n…ôdir?", options: ["KainatdakńĪ qara d…ôlikl…ôri AllahńĪn yaratmasńĪ", "Elmin a√ßńĪqlaya bilm…ôdiyi yerl…ôrd…ô Yaradan inancńĪnńĪn istifad…ôsi", "ńįnsan beynind…ôki boŇüluqlarńĪn tanrńĪ inancńĪ il…ô dolmasńĪ", "Dinl…ôrin elmi boŇüluqlarńĪ inkar etm…ôsi"], a: 1, points: 20 },
        { q: "XristianlńĪqda 325-ci ild…ô r…ôsmil…ôŇü…ôn v…ô T√∂vhid inancńĪna zidd olan …ôqid…ô nec…ô adlanńĪr?", options: ["Panteizm", "T…ôslis (√ú√ßl√ľk)", "V…ôhd…ôti-V√ľcud", "Dualizm"], a: 1, points: 20 },
        { q: "Qanad taxaraq ilk d…ôf…ô u√ßmańüa c…ôhd ed…ôn ∆Źnd…ôl√ľsl√ľ alim kimdir?", options: ["Abbas ibn Firnas", "∆Źl-C…ôz…ôri", "ńįbni Sina", "∆Źl-F…ôrqani"], a: 0, points: 20 },
        { q: "Bug√ľnk√ľ kibernetika v…ô robototexnikanńĪn …ôsasńĪnńĪ qoyan 'Kitab√ľl-Hiy…ôl' …ôs…ôrinin m√ľ…ôllifi kimdir?", options: ["Cabir ibn H…ôyyan", "∆Źl-B…ôttani", "∆Źl-C…ôz…ôri", "ńįbn Avvam"], a: 2, points: 20 },
        { q: "Y…ôhudilikd…ô y…ôhudi olmayanlarńĪ 'y√ľk eŇüŇü…ôkl…ôri' adlandńĪran kitab hansńĪdńĪr?", options: ["∆Źhdi-C…ôdid", "T√∂vrat", "Z…ôbur", "Talmud"], a: 3, points: 20 },

        // √á…ôtin S…ôviyy…ô (30 xal)
        { q: "ńįmam Q…ôzali '∆Źl Munqizu min…ôn dal…ôl' …ôs…ôrind…ô y…ôqinliy…ô (Ňü√ľbh…ôsiz bilgiy…ô) nec…ô √ßatdńĪńüńĪnńĪ qeyd edir?", options: ["F…ôls…ôf…ô oxuyaraq", "YalnńĪz Uca AllahńĪn q…ôlbin…ô axńĪtdńĪńüńĪ bir nur say…ôsind…ô", "T…ôcr√ľb…ôl…ôr apararaq", "AńüńĪlla h…ôr Ňüeyi k…ôŇüf ed…ôr…ôk"], a: 1, points: 30 },
        { q: "Rocer Qaraudi 'ńįslam v…ô insanlńĪńüńĪn g…ôl…ôc…ôyi' …ôs…ôrind…ô s…ôrv…ôtin bir q√ľtbd…ô yńĪńüńĪlmasńĪnńĪn qarŇüńĪsńĪnńĪ almaq √ľ√ß√ľn n…ôyi x√ľsusi vurńüulayńĪr?", options: ["Z…ôkat …ômri v…ô faiz qadańüasńĪ", "B√ľt√ľn mallarńĪn d√∂vl…ôt…ô verilm…ôsi", "Ticar…ôtin qadańüan edilm…ôsi", "YalnńĪz qńĪzńĪl puldan istifad…ô"], a: 0, points: 30 },
        { q: "ńįslam epistemologiyasńĪnda 'm√ľt…ôvatir x…ôb…ôr' nec…ô t…ôrif edilir?", options: ["T…ôk bir Ňü…ôxsin verdiyi x…ôb…ôr", "Yalan √ľz…ôrin…ô birl…ôŇüm…ôl…ôri d√ľŇü√ľn√ľl…ô bilm…ôy…ôn b√∂y√ľk topluluńüun x…ôb…ôri", "Aliml…ôrin f…ôrdi r…ôyi", "Kitablarda yazńĪlan m…ôlumat"], a: 1, points: 30 },
        { q: "Orta …ôsrl…ôrd…ô kils…ônin g√ľnahlarńĪ bańüńĪŇülamaq m…ôqs…ôdi il…ô insanlara satdńĪńüńĪ q…ôbzl…ôr nec…ô adlanńĪrdńĪ?", options: ["ńįndulgensiya", "V…ôftiz", "Aforoz", "Yevxaristiya"], a: 0, points: 30 },
        { q: "H…ôr Ňüeyin t…ôbii varlńĪqlardan meydana g…ôldiyini v…ô f√∂vq…ôlt…ôbii izahlara inanńĪlmamasńĪnńĪ m√ľdafi…ô ed…ôn f…ôls…ôfi c…ôr…ôyan n…ôdir?", options: ["ńįdealizm", "Ekzistensializm", "F…ôls…ôfi naturalizm", "Aqnostisizm"], a: 2, points: 30 },
        { q: "Q…ôrbd…ô 'Averroes' kimi tanńĪnan v…ô rahib HermannńĪn uńürunda oda atńĪldńĪńüńĪ filosof kimdir?", options: ["ńįbn R√ľŇüd", "ńįbni Sina", "∆Źl-Farabi", "∆Źl-Kindi"], a: 0, points: 30 }
    ];

    let currentQ = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let userName = "";

    // DńįQQ∆ŹT: Google Apps Script Web App URL-ni bura yapńĪŇüdńĪrńĪn!
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzigF185lh50h5EUdG6TLMU2qvpBlLR8h0hsia_5D5R8Bw1Sj0zKYfBFdnqF1fLdVIi/exec"; 

    function startGame() {
        const input = document.getElementById("username").value.trim();
        if(!input) { alert("Z…ôhm…ôt olmasa adńĪnńĪzńĪ daxil edin."); return; }
        userName = input;
        
        document.getElementById("login-screen").classList.remove("active");
        setTimeout(() => {
            document.getElementById("game-screen").classList.add("active");
            loadQuestion();
        }, 300);
    }

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 15;
        updateTimerUI();
        
        const qData = questions[currentQ];
        document.getElementById("question-counter").innerText = `Sual: ${currentQ + 1} / ${questions.length}`;
        document.getElementById("question-title").innerText = qData.q;
        
        const optsContainer = document.getElementById("options-container");
        optsContainer.innerHTML = "";
        
        qData.options.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optsContainer.appendChild(btn);
        });

        timer = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if(timeLeft <= 0) {
                clearInterval(timer);
                markCorrectAnswer();
                setTimeout(nextQuestion, 1500);
            }
        }, 1000);
    }

    function updateTimerUI() {
        document.getElementById("time-left").innerText = timeLeft;
        const circle = document.getElementById("timer-circle");
        const dashoffset = 188 - (188 * (timeLeft / 15));
        circle.style.strokeDashoffset = dashoffset;
    }

    function markCorrectAnswer() {
        const correctIndex = questions[currentQ].a;
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach(b => b.disabled = true);
        buttons[correctIndex].classList.add("correct");
    }

    function checkAnswer(selectedIndex, btn) {
        clearInterval(timer);
        const correctIndex = questions[currentQ].a;
        const buttons = document.querySelectorAll(".option-btn");
        
        buttons.forEach(b => b.disabled = true);
        
        if(selectedIndex === correctIndex) {
            btn.classList.add("correct");
            score += questions[currentQ].points;
            document.getElementById("score-counter").innerText = `Xal: ${score}`;
        } else {
            btn.classList.add("wrong");
            buttons[correctIndex].classList.add("correct");
        }
        setTimeout(nextQuestion, 1500);
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) {
            document.getElementById("game-screen").classList.remove("active");
            setTimeout(() => {
                document.getElementById("game-screen").classList.add("active");
                loadQuestion();
            }, 300);
        } else {
            endGame();
        }
    }

    function endGame() {
        document.getElementById("game-screen").classList.remove("active");
        setTimeout(() => {
            document.getElementById("leaderboard-screen").classList.add("active");
            document.getElementById("final-score-text").innerText = `T…ôbrikl…ôr ${userName}!\nYekun xalńĪnńĪz: ${score}`;
            submitScore();
        }, 300);
    }

    function submitScore() {
        // ∆Źg…ôr URL daxil edilm…ôyibs…ô, yalnńĪz lokal n…ôtic…ôni g√∂st…ôr
        if(GOOGLE_SCRIPT_URL === "SńįZńįN_GOOGLE_APPS_SCRIPT_URL_BURAYA") {
            displayLeaderboard([{name: userName, score: score}]);
            return;
        }

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: userName, score: score })
        }).then(() => {
            fetchLeaderboard();
        }).catch(err => {
            console.error("X…ôta baŇü verdi:", err);
            displayLeaderboard([{name: userName, score: score}]);
        });
    }

    function fetchLeaderboard() {
        fetch(GOOGLE_SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                displayLeaderboard(data);
            })
            .catch(err => {
                // ∆Źg…ôr GET iŇül…ôm…ôs…ô (no-cors olduńüuna g√∂r…ô), saxta m…ôlumat g√∂st…ôririk
                displayLeaderboard([
                    {name: userName, score: score},
                    {name: "M√ľsabiq…ô ńįŇütirak√ßńĪsńĪ", score: 350},
                    {name: "Kitabsev…ôr", score: 280}
                ].sort((a,b) => b.score - a.score));
            });
    }

    function displayLeaderboard(data) {
        const lbContainer = document.getElementById("leaderboard-data");
        lbContainer.innerHTML = "";
        
        data.slice(0, 5).forEach((user, index) => {
            let podiumClass = "podium-other";
            if(index === 0) podiumClass = "podium-1";
            else if(index === 1) podiumClass = "podium-2";
            else if(index === 2) podiumClass = "podium-3";
            
            lbContainer.innerHTML += `
                <li class="${podiumClass}">
                    <span>${index + 1}. ${user.name}</span> 
                    <span style="color: var(--primary-color);">${user.score} Xal</span>
                </li>
            `;
        });
    }
</script>
